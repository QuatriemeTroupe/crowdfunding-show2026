[data-theme="dark"]{

  --border:#1e293b;

.pill.warning{

body{

.pill{border:1px solid var(--border);padding:3px 9px;border-radius:999px;}

.btn.success{background:var(--success);color:#fff;}

.story{

/* HERO */
.hero {
  height: 500px;
  display: flex;
  align-items: flex-end;
  padding: 20px;
  color: white;
  font-size: 26px;
  font-weight: 900;

  background-position: center 1px;
  background-size: cover;
  background-color: #333;
}

/* COMMUNICATION IBAN */
.iban-notice {
  margin-top: 12px;

  border-radius: 14px;
  background: #fffbeb;
  font-size: 14px;
  line-height: 1.6;
}
[data-theme="dark"] .iban-notice {
  background: #1c1100;
  border-color: #b45309;
}
.iban-notice .iban-label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #92400e;
  font-weight: 700;
  margin-bottom: 6px;
}
[data-theme="dark"] .iban-notice .iban-label {
  color: #fbbf24;
}
.iban-notice .iban-value {
  font-size: 18px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: 0.5px;
}
.iban-notice .iban-sub {
  display: block;
  margin-top: 4px;
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
}

.donation-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid var(--border);

.qr-col { flex: 0 0 auto; width: 120px; }
.rewards-col { flex: 2; min-width: 200px; }
.top-col { flex: 1.5; min-width: 180px; }

.section-title {
  font-size: 11px;

  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 8px;
  font-weight: bold;

.reward-row {

.reward-val {

  width: 45px;
  flex-shrink: 0;
}

.reward-txt {
  flex: 1;
  text-align: right;
}  

.top-list { list-style: none; padding: 0; margin: 0; }
.top-item {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 13px;
  padding: 4px 0;
  gap: 8px;
}
.top-name {
  flex: 1;
  word-break: break-word;
}
.top-amt { font-weight: bold; white-space: nowrap; }

.carousel {
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  margin: 18px 0;
  height: 450px;
  background: #eee;
}
.carousel-track {
  display: flex;
  height: 100%;
  transition: transform .6s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
}
.carousel-slide {
  min-width: 100%;
  flex-shrink: 0;
  background-size: cover;
  background-position: 0% center;
  background-repeat: no-repeat;
}
.carousel-dots{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:6px;
}
.carousel-dots span{
  width:10px;
  height:10px;
  border-radius:50%;
  background:rgba(255,255,255,.4);
}
.carousel-dots .active{background:white;}

.qr{
  width:100%;
  aspect-ratio: 1/1;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--soft);

.small{font-size:12px;color:var(--muted);}

.video-wrap {
  margin-top: 20px;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  background: #000;

.video-wrap iframe {

  top: 0;
  left: 0;
  width: 100%;

function formatDateFR(dateStr){
  if (!dateStr) return "—";
  try {
    if (dateStr.includes("T")) {
      return new Date(dateStr).toLocaleDateString("fr-BE", {day:"2-digit",month:"2-digit",year:"numeric"});
    }
    if (dateStr.includes("-")) {
      const [year, month, day] = dateStr.split("-");
      return `${day}/${month}/${year}`;
    }
    if (dateStr.includes("/")) {
      const [day, month, year] = dateStr.split("/");
      return `${day.padStart(2,"0")}/${month.padStart(2,"0")}/${year}`;
    }
    return dateStr;
  } catch (e) {
    return dateStr;
  }
}

document.getElementById("btnShare").onclick = async () => {
    const shareData = {
        title: 'Show Vélo 2026',
        text: 'Soutenez le projet Show Vélo 2026 des scouts de Saint-Michel !',
        url: window.location.href
    };
    try {
        if (navigator.share) {
            await navigator.share(shareData);
        } else {
            await navigator.clipboard.writeText(window.location.href);
            alert(lang === "fr" ? "Lien copié dans le presse-papier !" : "Link copied to clipboard!");
        }
    } catch (err) { console.log(err); }
};

async function loadData(){
  try{
    const r = await fetch(`${DATA_URL}?token=${TOKEN}`);
    const d = await r.json();
    cachedData = d;

    const pct = Math.min(100, Math.round(d.current / d.goal * 100));
    document.getElementById("fill").style.width = pct + "%";
    set("currentTxt", `${fmt(d.current)} (${pct}%)`);
    set("goalTxt", fmt(d.goal));
    set("endTxt", formatDateFR(d.endDate));
    set("updatedTxt", formatDateFR(d.updated));

    if (d.endDate) {
      const days = Math.max(0, Math.ceil((new Date(d.endDate) - Date.now()) / 86400000));
      const daysEl = document.getElementById("daysLeft");
      daysEl.classList.remove("warning");
      if (days === 0) {
        daysEl.textContent = LANGS[lang].lastDay;
        daysEl.classList.add("warning");
      } else {
        const unit = days === 1 ? LANGS[lang].day : LANGS[lang].days;
        daysEl.textContent = `⏳ ${days} ${unit}`;
        if (days <= 3) daysEl.classList.add("warning");
      }
    }

    if (d.payconiqQr) {
      document.getElementById("qrImg").src = d.payconiqQr;
      document.getElementById("qrWrap").style.display = "block";
    }

    const topList = document.getElementById("topDonorsList");
    topList.innerHTML = "";
    if (d.topDonors && d.topDonors.length > 0) {
      d.topDonors.forEach((donor, i) => {
        const li = document.createElement("li");
        li.className = "top-item";
        const rankIcon = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉"
          : `<small style="opacity:0.5;width:20px;display:inline-block">${i+1}.</small>`;
        li.innerHTML = `<span class="top-name">${rankIcon} ${donor.name}</span><span class="top-amt">${fmt(donor.amount)}</span>`;
        topList.appendChild(li);
      });
    } else {
      topList.innerHTML = "<li class='small' style='opacity:0.5'>En attente de donateurs...</li>";
    }

    if (d.youtubeUrl) {
      const url = d.youtubeUrl;
      let videoId = url.includes('v=') ? url.split('v=')[1].split('&')[0]
        : (url.includes('youtu.be/') ? url.split('youtu.be/')[1].split('?')[0] : "");
      if (videoId) {
        document.getElementById("ytPlayer").src = `https://www.youtube.com/embed/${videoId}`;
        document.getElementById("ytWrap").style.display = "block";
      }
    }

    // Tombola — données dynamiques depuis le Google Sheet
    set("tombolaTicketCount", d.tombolaTickets ?? "—");
    set("tombolaDrawDateVal", formatDateFR(d.tombolaDrawDate));

    const btn = document.getElementById("btnIban");
    btn.onclick = async () => {
      await navigator.clipboard.writeText(d.iban);
      btn.textContent = "IBAN copié ✅";
      btn.classList.add("success");
      setTimeout(() => {
        btn.classList.remove("success");
        applyLang();
      }, 1500);
    };

    set("statusTxt", d.current >= d.goal ? LANGS[lang].reached : LANGS[lang].thanks);

  } catch (err) {
    console.error(err);
    document.getElementById("statusTxt").textContent = "⚠️ Erreur de chargement";
  }
}

const track=document.getElementById("carouselTrack");
const dots=document.getElementById("carouselDots");
[...track.children].forEach((_,i)=>{
  const d=document.createElement("span");
  if(i===0)d.classList.add("active");
  dots.appendChild(d);
});
let index=0;
setInterval(()=>{
  index=(index+1)%track.children.length;
  track.style.transform=`translateX(-${index*100}%)`;
  [...dots.children].forEach((d,i)=>d.classList.toggle("active",i===index));
},4000);

document.getElementById("toggleTheme").onclick=()=>{
  theme=theme==="light"?"dark":"light";
  document.documentElement.dataset.theme=theme;
  localStorage.theme=theme;
};
document.getElementById("toggleLang").onclick=()=>{
  lang=lang==="fr"?"en":"fr";
  localStorage.lang=lang;
  applyLang();
};

applyLang();
loadData();

setInterval(() => {
  if (!document.hidden) {
    loadData();
  }
}, 2 * 60 * 1000);
